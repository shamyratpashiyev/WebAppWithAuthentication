@if (spinnerService.isLoading()) {
  <div class="spinner-overlay d-flex flex-column justify-content-center align-items-center">
    <div class="spinner-border text-primary" style="width: 3.5rem; height: 3.5rem;" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <h5 class="text-white mt-3 fw-light">Processing...</h5>
  </div>
}
