
<div class="container mt-5">
  <h2 class="mb-4">User Management</h2>

  <div class="toolbar-container d-flex justify-content-between align-items-center mb-3 p-3">
    <div id="actionButtons" class="d-flex justify-content-center column-gap-1">
      <button type="button" class="btn btn-outline-primary btn-sm" id="btnBlock">
        <i class="bi bi-lock-fill"></i>
        Block
      </button>
      <button type="button" class="btn btn-outline-primary btn-sm" title="Unblock" id="btnUnblock">
        <i class="bi bi-unlock-fill"></i>
      </button>
      <button type="button" class="btn btn-outline-danger btn-sm" title="Delete" id="btnDelete">
        <i class="bi bi-trash-fill"></i>
      </button>
      <button type="button" class="btn btn-outline-danger btn-sm" title="Delete Unverified" id="btnDeleteUnverified">
        <i class="bi bi-person-x-fill"></i>
      </button>
    </div>

    <div class="d-flex align-items-center">
      <input type="text" id="userFilter" class="form-control form-control-sm" placeholder="Filter">
    </div>
  </div>


  <div class="table-container table-responsive">
    <table class="table table-hover mb-0">
      <thead class="table-light">
      <tr>
        <th scope="col" style="width: 40px;">
          <input class="form-check-input" type="checkbox" id="selectAll">
        </th>
        <th>Name</th>
        <th>Email</th>
        <th>Status</th>
        <th>Last Seen</th>
      </tr>
      </thead>
      <tbody id="userTableBody">
        @for (user of userList; track user.id) {
          <tr>
              <td>
                  <input class="form-check-input user-checkbox" type="checkbox" value="101">
              </td>
              <td>
                  <div>{{ user.name }} {{ user.surname }}</div>
                  <div class="text-muted small">{{ user.position }}</div>
              </td>
              <td>
                  {{ user.email }}
              </td>
              <td>{{ user.status }}</td>
              <td title="" data-bs-toggle="tooltip" class="timeago" datetime=""></td>
          </tr>
        }

      </tbody>
    </table>
  </div>
</div>
