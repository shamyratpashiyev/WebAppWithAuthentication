<div class="auth-container">
  <div class="auth-card">
    <h2>Create Account</h2>
    <p class="subtitle">Join our platform to get started</p>
    <form [formGroup]="signupForm" (ngSubmit)="onSubmit()">
      <div class="form-row">
        <div class="form-group">
          <label for="name">Name</label>
          <input id="name" formControlName="name" type="text" class="form-control">
        </div>
        <div class="form-group">
          <label for="surname">Surname</label>
          <input id="surname" formControlName="surname" type="text" class="form-control">
        </div>
      </div>

      <div class="form-group">
        <label for="position">Position (Optional)</label>
        <input id="position" formControlName="position" type="text" class="form-control">
      </div>

      <div class="mb-3">
        <label for="email" class="form-label d-block text-start">Email Address</label>
        <div class="input-group">
          <input
            id="email"
            type="email"
            formControlName="email"
            class="form-control">
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <input
            id="password"
            [type]="isPasswordHidden() ? 'password' : 'text'"
            formControlName="password"
            class="form-control">
          <button type="button" class="toggle-btn" (click)="togglePasswordHidden()">
            {{ isPasswordHidden() ? 'Show' : 'Hide' }}
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input
          id="confirmPassword"
          [type]="isPasswordHidden() ? 'password' : 'text'"
          formControlName="confirmPassword"
          class="form-control">

        @if (signupForm.errors?.['passwordMismatch'] && signupForm.get('confirmPassword')?.touched) {
          <span class="error-text">Passwords do not match.</span>
        }
      </div>
      <div class="form-group-checkbox">
        <label class="checkbox-container">
          <input type="checkbox" formControlName="rememberMe">
          <span class="checkbox-label">Keep me logged in</span>
        </label>
      </div>

      <button type="submit" class="btn-primary" [disabled]="signupForm.invalid">
        Sign Up
      </button>

      <div class="auth-footer">
        Already have an account? <a [routerLink]="['/login']">Log In</a>
      </div>
    </form>
  </div>
</div>
