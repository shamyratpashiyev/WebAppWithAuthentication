<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow-sm border-0 p-4" style="max-width: 450px; width: 100%;">
    <div class="card-body">

      <div class="text-center mb-4">
        <h2 class="h4 card-title fw-bold">Set New Password</h2>
        <p class="text-muted small">Please choose a strong password to secure your account.</p>
      </div>

      <form (submit)="onSubmit()" [formGroup]="resetForm">
        <div class="mb-3">
          <label for="password" class="form-label d-block text-start">New Password</label>
          <div class="input-group">
            <input
              id="password"
              formControlName="password"
              [type]="isPasswordHidden() ? 'password' : 'text'"
              class="form-control">
            <button
              type="button"
              class="btn btn-light border input-group-text"
              style="cursor: pointer;"
              (click)="togglePasswordHidden()">
              <i class="bi" [ngClass]="isPasswordHidden() ? 'bi-eye-slash-fill' : 'bi-eye-fill'"></i>
            </button>
          </div>
        </div>

        <div class="mb-4">
          <label for="confirmPassword" class="form-label d-block text-start">Confirm New Password</label>
          <div class="input-group">
            <input
              id="confirmPassword"
              formControlName="confirmPassword"
              type="password"
              class="form-control"
              [type]="isPasswordHidden() ? 'password' : 'text'">
          </div>
          @if (resetForm.errors?.['passwordMismatch'] && resetForm.get('confirmPassword')?.touched) {
            <div class="text-danger small mt-1">Passwords do not match.</div>
          }
        </div>

        <button
          type="submit"
          class="btn btn-primary w-100 py-2 fw-bold"
          [disabled]="resetForm.invalid || isLoading()">
          @if (isLoading()) {
            <span class="spinner-border spinner-border-sm me-2"></span> Updating...
          } @else {
            Update Password
          }
        </button>

      </form>

      <div class="text-center mt-4">
        <a routerLink="/login" class="text-decoration-none small text-secondary">
          Cancel and return to login
        </a>
      </div>

    </div>
  </div>
</div>
